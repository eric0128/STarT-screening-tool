<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STarT 背部檢測工具</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: #f0f4f8; 
            margin:0; 
            padding:15px; 
        }
        .container { 
            max-width: 720px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); 
            overflow: hidden; 
        }
        header { 
            background: #1e40af; 
            color: white; 
            padding: 25px 20px; 
            text-align: center; 
        }
        .header-title {
            font-size: 1.85em;
            margin: 0 0 8px 0;
        }
        .header-subtitle {
            font-size: 1.15em;
            margin: 0;
            opacity: 0.95;
        }
        .content { padding: 25px; }
        .question-area { min-height: 360px; }
       
        h1 { margin: 0; font-size: 1.9em; }
       
        .question {
            font-size: 1.6em;
            line-height: 1.65;
            margin-bottom: 35px;
            font-weight: 500;
        }
       
        .options label {
            display: block;
            margin: 18px 0;
            padding: 28px 24px;
            border-radius: 18px;
            font-size: 1.55em;
            cursor: pointer;
            border: 4px solid #e2e8f0;
            transition: all 0.3s;
            min-height: 85px;
            display: flex;
            align-items: center;
        }

        .options label.agree {
            background: #f0fdf4;
            color: #15803d;
            border-color: #22c55e;
            order: 1;
        }
        .options label.disagree {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #ef4444;
            order: 2;
        }

        /* Question 9 Color Scale */
        .options.q9 label:nth-child(1) { background: #dcfce7; border-color: #4ade80; color: #166534; }
        .options.q9 label:nth-child(2) { background: #ecfdf5; border-color: #86efac; color: #14532d; }
        .options.q9 label:nth-child(3) { background: #fefce8; border-color: #facc15; color: #854d0e; }
        .options.q9 label:nth-child(4) { background: #ffedd5; border-color: #fb923c; color: #9a3412; }
        .options.q9 label:nth-child(5) { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

        .options input {
            margin-right: 20px;
            transform: scale(1.6);
        }
       
        button {
            padding: 18px 24px;
            font-size: 1.35em;
            margin: 12px 5px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }
       
        .btn-repeat { background: #8b5cf6; color: white; }
        .btn-primary { background: #1e40af; color: white; }
       
        #progress {
            text-align: center;
            font-size: 1.25em;
            color: #64748b;
            margin: 15px 0;
            font-weight: 500;
        }
       
        #result {
            display: none;
            padding: 40px 30px;
            text-align: center;
        }
        .big-text {
            font-size: 2.4em;
            font-weight: bold;
            margin: 25px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="header-title">STarT 背部檢測工具</h1>
        <p class="header-subtitle">北區醫院 物理治療部</p>
    </header>

    <div class="content">
        <div id="modeSelect">
            <button class="btn-primary" onclick="startGuidedMode()">🗣️ 開始語音引導模式</button>
        </div>

        <div id="guidedMode" style="display:none;">
            <div id="progress">第 <span id="qNum">1</span> / 9 題</div>
            
            <div class="question-area">
                <p id="questionText" class="question"></p>
                <div class="options" id="options"></div>
            </div>

            <button class="btn-repeat" onclick="repeatCurrent()">🔁 重播當前題目</button>
        </div>

        <div id="result">
            <h2>檢測完成！</h2>
            <p class="big-text">總分：<span id="totalScore"></span> 分</p>
            <p style="font-size:1.45em; margin:20px 0;">細分分數：<span id="subScore"></span> 分</p>
            
            <button onclick="restartAll()" class="btn-primary">重新開始檢測</button>
            <p style="margin-top:40px; font-size:1.1em; color:#444;">
                完成問卷，請告知物理治療師
            </p>
        </div>
    </div>
</div>

<script>
// 問題資料
const questions = [
    { id:1, text: "在過去兩周，我的背痛曾經擴散到腿部", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:2, text: "在過去兩周，我有時會有肩、頸部痛的情況", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:3, text: "我曾因為背痛而僅能作短距離步行", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:4, text: "在過去兩周，我曾因為背痛導致穿衣服的速度比平常緩慢", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:5, text: "我認為對於一個和我有相同狀況的人來說，體力活動是不安全的", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:6, text: "我經常會擔心我的背痛", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:7, text: "我覺得我的背痛很嚴重，而且永遠不會得到任何改善", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:8, text: "整體而言，我不再享受過去喜歡做的事", options: ["同意", "不同意"], types: ["agree", "disagree"] },
    { id:9, text: "整體而言，過去兩周內背痛對您的影響程度如何？", 
      options: ["完全不受影響", "輕微影響", "中度影響", "非常影響", "極度影響"], 
      types: ["neutral","neutral","neutral","neutral","neutral"] }
];

let currentQuestion = 0;
let answers = new Array(9).fill(null);

function speak(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-HK';
        utterance.rate = 0.88;
        utterance.pitch = 1.05;
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }
}

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('qNum').textContent = q.id;
    document.getElementById('questionText').textContent = q.text;

    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    optionsDiv.className = (q.id === 9) ? 'options q9' : 'options';

    q.options.forEach((option, index) => {
        const label = document.createElement('label');
        label.className = q.id === 9 ? "" : (q.types[index] === "agree" ? "agree" : "disagree");
        label.innerHTML = `
            <input type="radio" name="answer" value="${index}" onchange="selectAnswer(${index})">
            ${option}
        `;
        optionsDiv.appendChild(label);
    });

    setTimeout(() => {
        let fullText = q.text + "。 ";
        q.options.forEach(opt => fullText += opt + "。 ");
        speak(fullText);
    }, 600);
}

function selectAnswer(index) {
    answers[currentQuestion] = (questions[currentQuestion].id === 9) ? 
        (index >= 3 ? 1 : 0) : 
        (questions[currentQuestion].types[index] === "agree" ? 1 : 0);

    setTimeout(() => {
        currentQuestion++;
        if (currentQuestion >= questions.length) {
            calculateResult();
        } else {
            showQuestion();
        }
    }, 900);
}

function repeatCurrent() {
    const q = questions[currentQuestion];
    let fullText = q.text + "。 ";
    q.options.forEach(opt => fullText += opt + "。 ");
    speak(fullText);
}

function calculateResult() {
    let total = 0;
    let sub = 0;
    for (let i = 0; i < 9; i++) {
        if (answers[i] !== null) {
            total += answers[i];
            if (i >= 4) sub += answers[i];
        }
    }

    document.getElementById('guidedMode').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('totalScore').textContent = total;
    document.getElementById('subScore').textContent = sub;
}

function startGuidedMode() {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('guidedMode').style.display = 'block';
    currentQuestion = 0;
    answers = new Array(9).fill(null);
    showQuestion();
}

function restartAll() {
    location.reload();
}
</script>
</body>
</html>
